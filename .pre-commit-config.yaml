repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run -m ruff check . --fix
        language: system
        always_run: true
        pass_filenames: false
      - id: tiny tests
        name: tiny tests
        entry: uv run -m pytest tests 
        language: system
        always_run: true
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run -m mypy . 
        language: system
        always_run: true
        pass_filenames: false